<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gym Tracker</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131314; 
            color: #e3e3e3;
            overflow-x: hidden;
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Fixed CSS selector for control buttons */
        .input-control-btn {
            background: #28292c;
            border: 1px solid #3c4043;
            border-radius: 14px;
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #e3e3e3;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .input-control-btn:active {
            background: #3c4043;
            transform: scale(0.92);
        }

        .glass-header {
            background: rgba(19, 19, 20, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #28292c;
        }

        .dark-card {
            background: #1e1f20;
            border: 1px solid #28292c;
            border-radius: 24px;
        }

        .planner-input {
            background: #131314;
            border: 1px solid #3c4043;
            border-radius: 8px;
            color: #8ab4f8;
            font-weight: 800;
            text-align: center;
            font-size: 14px;
            padding: 6px 0;
            width: 100%;
            outline: none;
        }
        
        @keyframes big-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .timer-animate {
            animation: big-pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icons = {
            Logo: () => (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="9" width="4" height="6" rx="2" fill="#8ab4f8"/>
                    <rect x="18" y="9" width="4" height="6" rx="2" fill="#8ab4f8"/>
                    <path d="M6 12H18" stroke="#8ab4f8" strokeWidth="3" strokeLinecap="round"/>
                    <circle cx="12" cy="12" r="2" fill="#e3e3e3"/>
                </svg>
            ),
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Play: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            X: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
            ChevronRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
            Cloud: ({ active }) => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill={active ? "#10b981" : "none"} stroke={active ? "#10b981" : "currentColor"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.2-4-4.5A7 7 0 1 0 5 13c0 .3 0 .7.1 1a4.5 4.5 0 1 0 4.4 5h8z"/></svg>
        };

        // Header component now properly receives setView to avoid ReferenceErrors
        const Header = ({ title, sub, leftAction, rightAction, notionAvailable, setView }) => (
            <header className="glass-header pt-14 pb-5 px-6 sticky top-0 z-50 flex justify-between items-end safe-top">
                <div className="flex items-center gap-3">
                    {leftAction || <Icons.Logo />}
                    <div>
                        <h1 className="text-xl font-bold text-[#e3e3e3] leading-none mb-1">{title}</h1>
                        <div className="flex items-center gap-1.5">
                            <Icons.Cloud active={notionAvailable} />
                            <p className="text-[10px] text-[#9e9e9e] font-bold uppercase tracking-widest">{sub}</p>
                        </div>
                    </div>
                </div>
                {rightAction || (
                    <div className="flex gap-2">
                         <button onClick={() => setView('history')} className="p-3 bg-[#28292c] text-[#9e9e9e] rounded-full"><Icons.History /></button>
                         <button onClick={() => setView('settings')} className="p-3 bg-[#28292c] text-[#9e9e9e] rounded-full"><Icons.Settings /></button>
                    </div>
                )}
            </header>
        );

        const CONSTANTS = {
            EXERCISE_DB_ID: '2b3fe23d5e3c8011ac26d67c56e8309f',
            ROUTINE_DB_ID: '318fe23d5e3c80388d2bd8dfbcfedf00',
            LOG_DB_ID: '313fe23d5e3c80e384b9c7b5f9917e84',
            MOTIVATIONS: [
                "Stronger than yesterday.",
                "Discipline beats motivation.",
                "Focus on progress, not perfection.",
                "Great work, now go recover!"
            ]
        };

        const App = () => {
            const [view, setView] = useState('home');
            const [routines, setRoutines] = useState(() => JSON.parse(localStorage.getItem('gym_routines') || '[]'));
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('gym_history') || '[]'));
            const [notionAvailable, setNotionAvailable] = useState(false);
            const [notionExercises, setNotionExercises] = useState(() => JSON.parse(localStorage.getItem('notion_exercises_cache') || '[]'));

            const [exerciseDbId, setExerciseDbId] = useState(CONSTANTS.EXERCISE_DB_ID);
            const [routineDbId, setRoutineDbId] = useState(CONSTANTS.ROUTINE_DB_ID);
            const [logDbId, setLogDbId] = useState(CONSTANTS.LOG_DB_ID);
            
            const [activeRoutine, setActiveRoutine] = useState(null);
            const [currentExerciseIndex, setCurrentExerciseIndex] = useState(0);
            const [workoutLog, setWorkoutLog] = useState({});
            const [workoutNotes, setWorkoutNotes] = useState({});
            const [inputWeight, setInputWeight] = useState(0);
            const [inputReps, setInputReps] = useState(10);
            
            const [timerActive, setTimerActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(0);
            const [targetEndTime, setTargetEndTime] = useState(null);
            
            const [syncStatus, setSyncStatus] = useState('idle');
            const [isLogging, setIsLogging] = useState(false);
            const [showConfirmDelete, setShowConfirmDelete] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [aiFeedback, setAiFeedback] = useState(null);
            const [aiFeedbackLoading, setAiFeedbackLoading] = useState(false);
            const [userProfile, setUserProfile] = useState(() => JSON.parse(localStorage.getItem('gym_user_profile') || '{"bodyweight":75,"experienceLevel":"intermediate","goal":"hypertrophy","weeklySplit":"Push Pull Legs"}'));

            const timerRef = useRef(null);
            const audioCtxRef = useRef(null);

            useEffect(() => {
                (async () => {
                    try {
                        const r = await fetch('/api/config');
                        const j = await r.json();
                        setNotionAvailable(!!j.notionConfigured);
                        if (j.EXERCISE_DB_ID) setExerciseDbId(j.EXERCISE_DB_ID);
                        if (j.ROUTINE_DB_ID) setRoutineDbId(j.ROUTINE_DB_ID);
                        if (j.LOG_DB_ID) setLogDbId(j.LOG_DB_ID);
                    } catch (e) {}
                })();
            }, []);

            useEffect(() => { localStorage.setItem('gym_routines', JSON.stringify(routines)); }, [routines]);
            useEffect(() => { if (notionAvailable) { fetchExercisesFromNotion(); fetchRoutinesFromNotion(); } }, [notionAvailable]);
            useEffect(() => { localStorage.setItem('gym_history', JSON.stringify(history)); }, [history]);
            useEffect(() => { localStorage.setItem('gym_user_profile', JSON.stringify(userProfile)); }, [userProfile]);

            useEffect(() => {
                if (view === 'active' && activeRoutine && activeRoutine.exercises) {
                    if (activeRoutine.exercises.length === 0) return;
                    const ex = activeRoutine.exercises[currentExerciseIndex];
                    if (!ex) return;
                    const logs = workoutLog[ex.id] || [];
                    if (logs.length > 0) {
                        setInputWeight(logs[logs.length - 1].w);
                        setInputReps(logs[logs.length - 1].r);
                    } else {
                        setInputWeight(ex.suggestedWeight || 0);
                        setInputReps(ex.targetReps || 10);
                    }
                }
            }, [currentExerciseIndex, view, activeRoutine, workoutLog]);

            const fetchExercisesFromNotion = async () => {
                if (!notionAvailable) return;
                setSyncStatus('syncing');
                try {
                    const response = await fetch('/api/notion', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            path: `databases/${exerciseDbId}/query`,
                            body: { filter: { property: "Routine", select: { is_not_empty: true } } }
                        })
                    });
                    const data = await response.json();
                    const fetched = data.results.map(page => {
                        const p = page.properties;
                        const weightStr = p["Weight"]?.rich_text[0]?.plain_text || "0";
                        const weight = parseFloat(weightStr.match(/[\d.]+/)?.[0] || 0);
                        return {
                            id: page.id,
                            name: p["Exercise Name"]?.title[0]?.plain_text || "Untitled",
                            tag: p["Routine"]?.select?.name || "",
                            sets: parseInt(p["Sets"]?.rich_text[0]?.plain_text || 3),
                            pause: parseInt(p["Pause"]?.rich_text[0]?.plain_text || 90),
                            weight: weight
                        };
                    });
                    setNotionExercises(fetched);
                    localStorage.setItem('notion_exercises_cache', JSON.stringify(fetched));
                    setSyncStatus('success');
                    setTimeout(() => setSyncStatus('idle'), 2000);
                } catch (err) { setSyncStatus('error'); }
            };

            const fetchRoutinesFromNotion = async () => {
                if (!notionAvailable) return;
                try {
                    const resp = await fetch('/api/notion', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ path: `databases/${routineDbId}/query`, body: {} })
                    });
                    const data = await resp.json();
                    const fetched = data.results.map(page => {
                        try {
                            const r = JSON.parse(page.properties.JSON.rich_text[0].plain_text);
                            return { ...r, notionPageId: page.id };
                        } catch { return null; }
                    }).filter(Boolean);
                    if (fetched.length) {
                        setRoutines(prev => {
                            const notionIds = new Set(fetched.map(r => r.id));
                            const localOnly = prev.filter(r => !notionIds.has(r.id));
                            return [...fetched, ...localOnly];
                        });
                    }
                } catch (e) {}
            };

            const pushToNotionLog = async () => {
                setIsLogging(true);
                const today = new Date().toISOString().split('T')[0];
                const workoutPayload = {
                    workout_type: activeRoutine.name,
                    date: today,
                    exercises: Object.entries(workoutLog).map(([exId, sets]) => {
                        const exercise = activeRoutine.exercises.find(e => e.id.toString() === exId.toString());
                        if (!exercise) return null;
                        return {
                            name: exercise.name,
                            sets: sets.length,
                            reps: sets.map(s => parseInt(s.r)),
                            weight: sets.map(s => parseFloat(s.w)),
                            rest_sec: parseInt(exercise.defaultPause) || 60,
                            ...(workoutNotes[exId] ? { notes: workoutNotes[exId] } : {})
                        };
                    }).filter(Boolean)
                };
                if (notionAvailable) {
                    for (const exId in workoutLog) {
                        const exercise = activeRoutine.exercises.find(e => e.id.toString() === exId.toString());
                        if (!exercise) continue;
                        for (const set of workoutLog[exId]) {
                            await fetch("/api/notion", {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    path: "pages",
                                    body: {
                                        parent: { database_id: logDbId },
                                        properties: {
                                            "Exercise": { title: [{ text: { content: exercise.name } }] },
                                            "Date": { date: { start: today } },
                                            "Weight": { number: parseFloat(set.w) || 0 },
                                            "Reps": { number: parseInt(set.r) || 0 },
                                            "Rest": { number: parseInt(exercise.defaultPause) || 0 },
                                            ...(workoutNotes[exId] ? { "Notes": { rich_text: [{ text: { content: workoutNotes[exId] } }] } } : {})
                                        }
                                    }
                                })
                            });
                        }
                    }
                }
                setHistory(prev => [{ id: Date.now(), date: today, routineName: activeRoutine.name, summary: notionAvailable ? "Synced" : "Local" }, ...prev]);
                setIsLogging(false);
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                setView('success');
                fetchAIFeedback(workoutPayload);
            };

            const saveRoutineToNotion = async (routine) => {
                if (!notionAvailable) return routine;
                try {
                    const { notionPageId, ...routineData } = routine;
                    if (notionPageId) {
                        await fetch('/api/notion', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                method: 'PATCH',
                                path: `pages/${notionPageId}`,
                                body: { properties: { "JSON": { rich_text: [{ text: { content: JSON.stringify(routineData) } }] } } }
                            })
                        });
                        return routine;
                    } else {
                        const resp = await fetch('/api/notion', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                path: 'pages',
                                body: {
                                    parent: { database_id: routineDbId },
                                    properties: {
                                        "Name": { title: [{ text: { content: routine.name } }] },
                                        "JSON": { rich_text: [{ text: { content: JSON.stringify(routineData) } }] }
                                    }
                                }
                            })
                        });
                        const data = await resp.json();
                        return { ...routine, notionPageId: data.id };
                    }
                } catch (e) { return routine; }
            };

            const fetchAIFeedback = async (workoutPayload) => {
                setAiFeedbackLoading(true);
                setAiFeedback(null);
                try {
                    const resp = await fetch('/api/feedback', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            workout: workoutPayload,
                            profile: {
                                experience_level: userProfile.experienceLevel,
                                bodyweight: parseFloat(userProfile.bodyweight) || 75,
                                goal: userProfile.goal,
                                weekly_split: userProfile.weeklySplit
                            }
                        })
                    });
                    const data = await resp.json();
                    setAiFeedback(data.feedback || 'No feedback available.');
                } catch (e) {
                    setAiFeedback('Could not generate feedback.');
                }
                setAiFeedbackLoading(false);
            };

            const saveRoutine = async () => {
                setIsSaving(true);
                let routineToSave = activeRoutine;
                if (notionAvailable) routineToSave = await saveRoutineToNotion(activeRoutine);
                setRoutines(prev => prev.find(r => r.id === routineToSave.id)
                    ? prev.map(r => r.id === routineToSave.id ? routineToSave : r)
                    : [...prev, routineToSave]
                );
                setIsSaving(false);
                setView('home');
            };

            const startTimer = (seconds) => {
                try {
                    if (!audioCtxRef.current) {
                        audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    } else if (audioCtxRef.current.state === 'suspended') {
                        audioCtxRef.current.resume();
                    }
                } catch (e) {}
                setTargetEndTime(Date.now() + (seconds * 1000));
                setTimeLeft(seconds);
                setTimerActive(true);
            };

            useEffect(() => {
                if (timerActive && targetEndTime) {
                    timerRef.current = setInterval(() => {
                        const remaining = Math.max(0, Math.ceil((targetEndTime - Date.now()) / 1000));
                        setTimeLeft(remaining);
                        if (remaining <= 0) { 
                            setTimerActive(false); 
                            setTargetEndTime(null);
                            try {
                                const ctx = audioCtxRef.current || new (window.AudioContext || window.webkitAudioContext)();
                                if (ctx.state === 'suspended') ctx.resume();
                                const osc = ctx.createOscillator();
                                const gain = ctx.createGain();
                                osc.frequency.value = 880;
                                osc.connect(gain);
                                gain.connect(ctx.destination);
                                gain.gain.setValueAtTime(0.4, ctx.currentTime);
                                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.8);
                                osc.start(ctx.currentTime);
                                osc.stop(ctx.currentTime + 0.8);
                            } catch (e) {}
                        }
                    }, 500);
                }
                return () => clearInterval(timerRef.current);
            }, [timerActive, targetEndTime]);

            if (view === 'settings') return (
                <div className="min-h-screen bg-[#131314]">
                    <Header title="Settings" sub="Pulse Engine" leftAction={<button onClick={() => setView('home')} className="p-2 -ml-2"><Icons.ChevronLeft /></button>} notionAvailable={notionAvailable} setView={setView} />
                    <main className="p-6 space-y-6">
                        <div className="p-6 dark-card space-y-2">
                            <p className="text-[10px] font-black text-zinc-500 uppercase">Notion</p>
                            <p className="text-sm text-[#9e9e9e]">Set <span className="text-[#8ab4f8] font-mono">NOTION_API_KEY</span> and <span className="text-[#8ab4f8] font-mono">OPENAI_API_KEY</span> in Vercel env vars.</p>
                        </div>
                        <button disabled={!notionAvailable} onClick={fetchExercisesFromNotion} className="w-full py-5 bg-[#8ab4f8] text-black rounded-[24px] font-bold disabled:opacity-50">Sync Notion Library</button>
                        <div className="p-6 dark-card space-y-4">
                            <p className="text-[10px] font-black text-zinc-500 uppercase">Your Profile</p>
                            <div><label className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Bodyweight (kg)</label><input type="number" value={userProfile.bodyweight} onChange={e => setUserProfile(p => ({...p, bodyweight: e.target.value}))} className="w-full bg-[#131314] border border-[#3c4043] rounded-xl text-[#8ab4f8] font-bold text-sm p-3 outline-none" /></div>
                            <div><label className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Experience</label><select value={userProfile.experienceLevel} onChange={e => setUserProfile(p => ({...p, experienceLevel: e.target.value}))} className="w-full bg-[#131314] border border-[#3c4043] rounded-xl text-[#8ab4f8] font-bold text-sm p-3 outline-none"><option value="beginner">Beginner</option><option value="intermediate">Intermediate</option><option value="advanced">Advanced</option></select></div>
                            <div><label className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Goal</label><select value={userProfile.goal} onChange={e => setUserProfile(p => ({...p, goal: e.target.value}))} className="w-full bg-[#131314] border border-[#3c4043] rounded-xl text-[#8ab4f8] font-bold text-sm p-3 outline-none"><option value="hypertrophy">Hypertrophy</option><option value="strength">Strength</option><option value="endurance">Endurance</option></select></div>
                            <div><label className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Weekly Split</label><input type="text" value={userProfile.weeklySplit} onChange={e => setUserProfile(p => ({...p, weeklySplit: e.target.value}))} placeholder="e.g. Push Pull Legs" className="w-full bg-[#131314] border border-[#3c4043] rounded-xl text-[#8ab4f8] font-bold text-sm p-3 outline-none" /></div>
                        </div>
                    </main>
                </div>
            );

            if (view === 'home') return (
                <div className="min-h-screen bg-[#131314]">
                    <Header title="Training" sub={notionAvailable ? "Synced" : "Local Only"} notionAvailable={notionAvailable} setView={setView} />
                    <main className="p-6 space-y-4 pb-32">
                        {routines.map(r => (
                            <div key={r.id} className="p-5 dark-card flex items-center justify-between">
                                <div className="flex-1">
                                    <h3 className="text-lg font-bold">{r.name}</h3>
                                    <p className="text-[10px] text-[#9e9e9e] font-bold uppercase">{(r.exercises||[]).length} Exercises</p>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => { setActiveRoutine(r); setView('planner'); }} className="p-3"><Icons.Settings /></button>
                                    <button disabled={!r.exercises?.length} onClick={() => { setActiveRoutine(r); setCurrentExerciseIndex(0); setWorkoutLog({}); setWorkoutNotes({}); setAiFeedback(null); setAiFeedbackLoading(false); setView('active'); }} className="w-12 h-12 bg-[#8ab4f8] text-black rounded-[20px] flex items-center justify-center disabled:opacity-50"><Icons.Play /></button>
                                </div>
                            </div>
                        ))}
                        <button onClick={() => { setActiveRoutine({id:Date.now(), name:"New Session", exercises:[]}); setView('planner'); }} className="w-full py-10 border-2 border-dashed border-[#3c4043] rounded-[32px] flex flex-col items-center gap-2 text-[#9e9e9e]"><Icons.Plus /><span>Create Routine</span></button>
                    </main>
                </div>
            );

            if (view === 'planner') return (
                <div className="min-h-screen bg-[#131314] pb-48">
                    <Header title="Planner" sub="Protocol Editor" leftAction={<button onClick={() => setView('home')} className="p-2 -ml-2"><Icons.ChevronLeft /></button>} rightAction={<button onClick={() => setShowConfirmDelete(!showConfirmDelete)} className="p-3 bg-[#28292c] rounded-full"><Icons.Trash /></button>} notionAvailable={notionAvailable} setView={setView} />
                    <main className="p-6 space-y-6">
                        {showConfirmDelete && <div className="p-5 bg-red-900/20 border border-red-900 rounded-2xl"><button onClick={() => { setRoutines(routines.filter(r => r.id !== activeRoutine.id)); setView('home'); }} className="w-full bg-red-600 py-3 rounded-xl font-bold">DELETE</button></div>}
                        <input value={activeRoutine.name} onChange={e => setActiveRoutine({...activeRoutine, name: e.target.value})} className="text-3xl font-bold bg-transparent w-full text-white italic outline-none" />
                        <div className="flex flex-wrap gap-2">
                            {[...notionExercises].sort((a, b) => (a.tag || '').localeCompare(b.tag || '')).map((ex, i) => (
                                <button key={i} onClick={() => setActiveRoutine({...activeRoutine, exercises: [...activeRoutine.exercises, {id:Math.random(), name:ex.name, defaultPause:ex.pause, targetSets:ex.sets, suggestedWeight: ex.weight, targetReps: 10}]})} className="px-3 py-2 bg-[#1e1f20] border border-[#3c4043] rounded-xl text-[11px] font-semibold flex items-center gap-2 transition-all duration-100 active:scale-95 active:bg-[#8ab4f8]/20 active:border-[#8ab4f8]/50"><span className="bg-[#3c4043] px-1.5 rounded text-[8px] text-[#8ab4f8]">{ex.tag}</span> {ex.name}</button>
                            ))}
                        </div>
                        {activeRoutine.exercises.map((ex, i) => (
                            <div key={ex.id} className="p-5 dark-card space-y-4">
                                <div className="flex justify-between items-center">
                                    <input value={ex.name} onChange={e => { const n={...activeRoutine}; n.exercises[i].name=e.target.value; setActiveRoutine(n); }} className="font-bold bg-transparent outline-none w-full" />
                                    <button onClick={() => { const n={...activeRoutine}; n.exercises.splice(i,1); setActiveRoutine(n); }} className="p-2 text-[#3c4043] hover:text-[#9e9e9e]"><Icons.Trash /></button>
                                </div>
                                <div className="grid grid-cols-4 gap-2">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase block">Sets</label>
                                        <input key="Sets" type="number" value={ex.targetSets} onChange={e => {
                                            const val = parseFloat(e.target.value) || 0;
                                            const n = {...activeRoutine};
                                            n.exercises[i].targetSets = val;
                                            setActiveRoutine(n);
                                        }} className="planner-input" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase block">Reps</label>
                                        <input key="Reps" type="number" value={ex.targetReps} onChange={e => {
                                            const val = parseFloat(e.target.value) || 0;
                                            const n = {...activeRoutine};
                                            n.exercises[i].targetReps = val;
                                            setActiveRoutine(n);
                                        }} className="planner-input" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase block">Kg</label>
                                        <input key="KG" type="number" value={ex.suggestedWeight} onChange={e => {
                                            const val = parseFloat(e.target.value) || 0;
                                            const n = {...activeRoutine};
                                            n.exercises[i].suggestedWeight = val;
                                            setActiveRoutine(n);
                                        }} className="planner-input" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-zinc-500 uppercase block">Rest</label>
                                        <input key="Rest" type="number" value={ex.defaultPause} onChange={e => {
                                            const val = parseFloat(e.target.value) || 0;
                                            const n = {...activeRoutine};
                                            n.exercises[i].defaultPause = val;
                                            setActiveRoutine(n);
                                        }} className="planner-input" />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </main>
                    <footer className="fixed bottom-0 left-0 right-0 p-6 bg-[#131314] border-t border-[#28292c]"><button onClick={saveRoutine} disabled={isSaving} className="w-full py-5 bg-[#8ab4f8] text-black rounded-[24px] font-bold disabled:opacity-50">{isSaving ? 'Saving...' : 'Save Protocol'}</button></footer>
                </div>
            );

            if (view === 'active') {
                const ex = activeRoutine.exercises[currentExerciseIndex];
                const logged = workoutLog[ex.id] || [];
                return (
                    <div className="min-h-screen bg-[#131314]">
                        <Header title={ex.name} sub={`Step ${currentExerciseIndex + 1} of ${activeRoutine.exercises.length}`} notionAvailable={notionAvailable} setView={setView} />
                        <div className="h-1 bg-[#28292c]"><div className="h-1 bg-[#8ab4f8] transition-all duration-300" style={{width: `${((currentExerciseIndex + 1) / activeRoutine.exercises.length) * 100}%`}}></div></div>
                        <main className="p-6 space-y-8 pb-48">
                            <div className="flex gap-4">
                                <div className="flex-1 space-y-3">
                                    <div className="p-8 dark-card text-center relative bg-[#1e1f20]">
                                        <span className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Load</span>
                                        <input type="number" step="0.5" value={inputWeight} onChange={e => setInputWeight(e.target.value)} className="text-5xl font-black bg-transparent w-full text-center outline-none text-white italic" />
                                        <span className="text-[10px] font-black text-[#8ab4f8] uppercase absolute bottom-3 left-0 right-0">KG</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setInputWeight(prev => Math.max(0, parseFloat(prev) - 5))} className="flex-1 py-2 bg-[#28292c] text-[#9e9e9e] rounded-xl font-black text-xs">-5</button>
                                        <button onClick={() => setInputWeight(prev => Math.max(0, parseFloat(prev) - 2.5))} className="flex-1 py-2 bg-[#28292c] text-[#9e9e9e] rounded-xl font-black text-xs">-2.5</button>
                                        <button onClick={() => setInputWeight(prev => parseFloat(prev) + 2.5)} className="flex-1 py-2 bg-[#28292c] text-[#9e9e9e] rounded-xl font-black text-xs">+2.5</button>
                                        <button onClick={() => setInputWeight(prev => parseFloat(prev) + 5)} className="flex-1 py-2 bg-[#28292c] text-[#9e9e9e] rounded-xl font-black text-xs">+5</button>
                                    </div>
                                </div>
                                <div className="flex-1 space-y-3">
                                    <div className="p-8 dark-card text-center relative bg-[#1e1f20]">
                                        <span className="text-[10px] font-black text-zinc-500 uppercase block mb-1">Reps</span>
                                        <input type="number" value={inputReps} onChange={e => setInputReps(e.target.value)} className="text-5xl font-black bg-transparent w-full text-center outline-none text-white italic" />
                                        <span className="text-[10px] font-black text-[#8ab4f8] uppercase absolute bottom-3 left-0 right-0">REPS</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setInputReps(prev => Math.max(0, parseInt(prev) - 1))} className="flex-1 py-2 bg-[#28292c] text-[#9e9e9e] rounded-xl font-black text-xs">-1</button>
                                        <button onClick={() => setInputReps(prev => parseInt(prev) + 1)} className="flex-1 py-2 bg-[#28292c] text-[#9e9e9e] rounded-xl font-black text-xs">+1</button>
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => { const n = {...workoutLog}; if(!n[ex.id]) n[ex.id]=[]; n[ex.id].push({w: inputWeight, r: inputReps}); setWorkoutLog(n); startTimer(ex.defaultPause); }} className="w-full py-7 bg-white text-black rounded-[28px] font-black text-xl italic">Log Set {logged.length+1} / {ex.targetSets}</button>
                            <div className="flex flex-wrap gap-2">{logged.map((s, i) => <div key={i} className="px-4 py-2 bg-[#8ab4f8]/10 text-[#8ab4f8] rounded-xl text-[10px] font-black">SET {i+1}: {s.w}KG × {s.r}</div>)}</div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-zinc-500 uppercase">Notes</label>
                                <textarea value={workoutNotes[ex.id] || ''} onChange={e => setWorkoutNotes(prev => ({...prev, [ex.id]: e.target.value}))} placeholder="How did it feel? Any adjustments..." rows={2} className="w-full bg-[#1e1f20] border border-[#3c4043] rounded-2xl p-4 text-sm text-[#e3e3e3] outline-none resize-none placeholder-[#3c4043] focus:border-[#8ab4f8]/40" />
                            </div>
                        </main>
                        {timerActive && (
                            <div className="fixed bottom-[6.5rem] left-4 right-4 z-40 flex items-center gap-4 px-5 py-4 rounded-2xl shadow-2xl" style={{background: 'linear-gradient(135deg, #ff6b35, #f7931e)'}}>
                                <div className="flex flex-col">
                                    <span className="text-white/70 text-[9px] font-black uppercase tracking-widest">Recovery</span>
                                    <span className="text-white font-black text-4xl leading-none tabular-nums timer-animate">
                                        {Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}
                                    </span>
                                </div>
                                <div className="flex gap-2 ml-auto">
                                    <button onClick={() => { setTargetEndTime(prev => Math.max(Date.now() + 500, prev - 15000)); }} className="py-2 px-3 bg-white/20 border border-white/30 text-white rounded-xl font-black text-sm">-15s</button>
                                    <button onClick={() => { setTimerActive(false); setTargetEndTime(null); }} className="py-2 px-4 bg-white text-[#f7931e] rounded-xl font-black text-sm">Skip</button>
                                </div>
                            </div>
                        )}
                        <footer className="fixed bottom-0 left-0 right-0 p-6 bg-[#131314] border-t border-[#28292c] flex gap-4">
                            <button onClick={() => currentExerciseIndex === 0 ? setView('home') : setCurrentExerciseIndex(i => i-1)} className="p-5 bg-[#28292c] rounded-2xl"><Icons.ChevronLeft /></button>
                            <button disabled={isLogging} onClick={() => currentExerciseIndex === activeRoutine.exercises.length - 1 ? pushToNotionLog() : setCurrentExerciseIndex(i => i + 1)} className="flex-1 bg-[#8ab4f8] text-black rounded-[24px] font-bold italic">{isLogging ? "Syncing..." : (currentExerciseIndex === activeRoutine.exercises.length-1 ? "End Session" : "Next Move")}</button>
                        </footer>
                    </div>
                );
            }

            if (view === 'success') {
                const motivation = CONSTANTS.MOTIVATIONS[Math.floor(Math.random() * CONSTANTS.MOTIVATIONS.length)];
                return (
                <div className="min-h-screen bg-[#131314] flex flex-col items-center justify-center p-10 space-y-8">
                    <div className="text-8xl animate-bounce">💪</div>
                    <h2 className="text-5xl font-black italic uppercase">Complete</h2>
                    <p className="text-xl italic text-center text-[#8ab4f8]">"{motivation}"</p>
                    {aiFeedbackLoading && (
                        <div className="flex items-center gap-3 text-[#9e9e9e] text-sm">
                            <div className="w-4 h-4 border-2 border-[#9e9e9e] border-t-transparent rounded-full animate-spin"></div>
                            Analyzing your workout...
                        </div>
                    )}
                    {aiFeedback && !aiFeedbackLoading && (
                        <button onClick={() => setView('feedback')} className="w-full py-5 bg-[#1e1f20] border border-[#8ab4f8]/40 text-[#8ab4f8] rounded-[24px] font-bold">View AI Feedback</button>
                    )}
                    <button onClick={() => setView('home')} className="w-full py-6 bg-white text-black rounded-3xl font-black italic">Return Home</button>
                </div>
            );
            }

            if (view === 'feedback') {
                const lines = (aiFeedback || '').split('\n').filter(l => l.trim());
                return (
                    <div className="min-h-screen bg-[#131314]">
                        <Header title="AI Feedback" sub="Coach Analysis" leftAction={<button onClick={() => setView('success')} className="p-2 -ml-2"><Icons.ChevronLeft /></button>} notionAvailable={notionAvailable} setView={setView} />
                        <main className="p-6 space-y-3 pb-28">
                            {lines.map((line, i) => (
                                <p key={i} className="text-[#e3e3e3] text-sm leading-relaxed">{line}</p>
                            ))}
                        </main>
                        <div className="fixed bottom-0 left-0 right-0 p-6 bg-[#131314] border-t border-[#28292c]">
                            <button onClick={() => setView('home')} className="w-full py-5 bg-white text-black rounded-[24px] font-black italic">Return Home</button>
                        </div>
                    </div>
                );
            }

            if (view === 'history') return (
                <div className="min-h-screen bg-[#131314]">
                    <Header title="Vault" sub="Archives" leftAction={<button onClick={() => setView('home')} className="p-2 -ml-2"><Icons.ChevronLeft /></button>} notionAvailable={notionAvailable} setView={setView} />
                    <main className="p-6 space-y-4">{history.map(h => <div key={h.id} className="p-5 dark-card"><h4>{h.routineName}</h4><p className="text-[10px] text-zinc-500">{h.date}</p></div>)}</main>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
